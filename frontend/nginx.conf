server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Para SPA (Single Page Application): redirige todas las rutas no encontradas a index.html
    # Así React Router maneja la navegación en cliente
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy inverso: /api/* se redirige al backend
    # Esto evita CORS en producción porque frontend y backend están en el mismo dominio
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
