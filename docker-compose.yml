# docker-compose.yml define los servicios (contenedores) que forman la aplicación
# Cada servicio es un contenedor que se construye desde un Dockerfile o desde una imagen
# Docker Compose los conecta en una red interna para que puedan comunicarse entre sí

services:
  # === Servicio de base de datos PostgreSQL ===
  db:
    # image: usa una imagen preconstruida desde Docker Hub, no un Dockerfile local
    image: postgres:16-alpine
    # container_name: nombre del contenedor (opcional, útil para identificarlo)
    container_name: tasktracker-db
    # restart: si el contenedor se detiene (ej. crash), Docker lo reinicia automáticamente
    restart: unless-stopped
    # environment: variables de entorno que PostgreSQL usa para configurarse
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # volumes: datos persistentes. Sin esto, al reiniciar el contenedor se pierden todos los datos
    volumes:
      - pgdata:/var/lib/postgresql/data
    # ports: mapea puerto del host al contenedor (host:contenedor)
    ports:
      - "5432:5432"
    # healthcheck: verifica que PostgreSQL esté listo antes de que otros servicios dependan de él
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === Servicio backend (Spring Boot) ===
  backend:
    # build: contexto de construcción (usa el Dockerfile en ./backend)
    build: ./backend
    container_name: tasktracker-backend
    restart: unless-stopped
    # env_file: carga variables desde el archivo .env
    env_file:
      - .env
    # depends_on: asegura que el servicio db arranque antes que backend
    # condition: espera a que el healthcheck de db pase
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  # === Servicio frontend (React con Nginx) ===
  frontend:
    build: ./frontend
    container_name: tasktracker-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

# volumes: declara volúmenes persistentes
# pgdata almacenará los datos de PostgreSQL fuera del contenedor
volumes:
  pgdata:
